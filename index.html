<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRADO. — Acesso</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f0ec;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #fff;
      padding: 50px 40px;
      border-radius: 4px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.06);
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .login-box h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: #3a3530;
      margin-bottom: 6px;
    }
    .login-box p {
      color: #8a8580;
      font-size: 0.85rem;
      margin-bottom: 30px;
    }
    .login-box input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 16px;
    }
    .login-box input:focus { border-color: #c9a96e; }
    .login-box button {
      width: 100%;
      padding: 14px;
      background: #c9a96e;
      border: none;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-radius: 3px;
      cursor: pointer;
    }
    .login-box button:hover { background: #b8965c; }
    .login-box .erro {
      color: #c0392b;
      font-size: 0.82rem;
      margin-top: 12px;
      display: none;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="login-box">
    <h1>PRADO.</h1>
    <p>Digite a senha para acessar</p>
    <input type="password" id="senha" placeholder="Senha" autofocus />
    <button onclick="entrar()">Entrar</button>
    <p class="erro" id="erro">Senha incorreta</p>
  </div>

  <script>
    // ═══════════════════════════════
    // 🔑 TROQUE A SENHA AQUI
    // ═══════════════════════════════
    const SENHA = "j665a352jq84";

    function entrar() {
      const senha = document.getElementById('senha').value;
      const erro = document.getElementById('erro');

      if (senha === SENHA) {
        sessionStorage.setItem('logado', 'true');
        window.location.href = 'home.html';
      } else {
        erro.style.display = 'block';
        document.getElementById('senha').value = '';
        document.getElementById('senha').focus();
      }
    }

    document.getElementById('senha').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') entrar();
    });
  </script>
</body>
</html>
